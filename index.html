<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23fe2c55'/%3E%3Cstop offset='1' stop-color='%2325f4ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M32 13 V37' stroke='%23fff' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M21 28 L32 41 L43 28' stroke='%23fff' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M17 50 H47' stroke='%23fff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>抖音无水印下载</title>
  <style>
    :root {
      --bg: #0f0f14;
      --bg-soft: #181822;
      --card: #20202c;
      --card-hover: #262635;
      --border: #2e2e3e;
      --text: #f4f4f8;
      --text-dim: #9a9ab0;
      --accent: #fe2c55;          /* 抖音红 */
      --accent-2: #25f4ee;        /* 抖音青 */
      --accent-grad: linear-gradient(135deg, #fe2c55 0%, #ff6a88 100%);
      --success: #2ecc71;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(254,44,85,0.13), transparent 38%),
        radial-gradient(circle at 88% 12%, rgba(37,244,238,0.10), transparent 40%);
      background-attachment: fixed;
    }

    /* ---------- 头部 ---------- */
    header {
      padding: 22px 0 6px;
      text-align: center;
    }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 24px; font-weight: 800; letter-spacing: 0.5px;
    }
    .logo .dot {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--accent-grad);
      display: grid; place-items: center; font-size: 18px;
      box-shadow: 0 6px 20px rgba(254,44,85,0.45);
    }
    .logo .accent { color: var(--accent); }
    .subtitle {
      color: var(--text-dim); font-size: 13px; margin-top: 8px;
    }

    /* ---------- 容器 ---------- */
    .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px 60px; }

    /* ---------- 输入卡 ---------- */
    .input-card {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
    textarea {
      flex: 1 1 320px;
      min-height: 110px;
      resize: vertical;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.6;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(254,44,85,0.18);
    }
    textarea::placeholder { color: #6a6a82; }
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      border: none; cursor: pointer; font-family: inherit;
      border-radius: 12px; font-weight: 600; font-size: 14px;
      padding: 13px 22px; transition: transform .08s, opacity .15s, background .15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent-grad); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.92; }
    .btn-ghost {
      background: var(--bg-soft); color: var(--text); border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--card-hover); }
    .hint { margin-top: 12px; color: var(--text-dim); font-size: 12px; }
    .hint .tag {
      display: inline-block; background: var(--bg-soft);
      border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px;
      margin-right: 6px; color: var(--accent-2);
    }

    /* ---------- 结果卡 ---------- */
    .result {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: pop .25s ease;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .result.hidden { display: none; }
    .result-head {
      display: flex; gap: 14px; padding: 18px;
      border-bottom: 1px solid var(--border);
    }
    .cover {
      width: 96px; height: 128px; border-radius: 10px; object-fit: cover;
      background: var(--bg-soft); flex-shrink: 0;
    }
    .cover.placeholder {
      display: grid; place-items: center; color: #555; font-size: 12px;
    }
    .meta { flex: 1; min-width: 0; }
    .meta .title {
      font-weight: 600; font-size: 15px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta .author { color: var(--text-dim); font-size: 13px; margin-top: 8px; }
    .meta .id-line { color: #6a6a82; font-size: 12px; margin-top: 6px; word-break: break-all; }
    .result-actions {
      padding: 14px 18px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .badge {
      font-size: 12px; color: var(--success);
      background: rgba(46,204,113,0.12); padding: 4px 10px; border-radius: 20px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    /* 清晰度选择器 */
    .quality-row {
      padding: 12px 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .quality-row .label { font-size: 13px; color: var(--text-dim); }
    .quality-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .quality-opt {
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
      background: var(--bg-soft); border: 1px solid var(--border); color: var(--text);
      font-family: inherit; transition: all .15s;
    }
    .quality-opt:hover { border-color: var(--accent); color: var(--accent); }
    .quality-opt.active {
      background: var(--accent-grad); border-color: transparent; color: #fff;
      box-shadow: 0 3px 12px rgba(254,44,85,0.35);
    }
    .spinner {
      width: 12px; height: 12px; border: 2px solid rgba(254,44,85,0.25);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- 状态条 ---------- */
    .status {
      margin-top: 14px; padding: 12px 16px; border-radius: 12px;
      font-size: 13px; display: none; align-items: center; gap: 10px;
    }
    .status.show { display: flex; }
    .status.info { background: rgba(37,244,238,0.08); color: var(--accent-2); border: 1px solid rgba(37,244,238,0.25); }
    .status.error { background: rgba(254,44,85,0.08); color: #ff8aa0; border: 1px solid rgba(254,44,85,0.3); }
    .status.success { background: rgba(46,204,113,0.08); color: var(--success); border: 1px solid rgba(46,204,113,0.25); }

    /* ---------- 历史记录 ---------- */
    .history { margin-top: 32px; }
    .history.hidden { display: none; }
    .section-title {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title h2 { font-size: 16px; font-weight: 600; }
    .section-title .clear {
      font-size: 12px; color: var(--text-dim); cursor: pointer;
      background: none; border: none; font-family: inherit;
    }
    .section-title .clear:hover { color: var(--accent); }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      display: flex; gap: 12px; align-items: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; transition: background .15s;
    }
    .history-item:hover { background: var(--card-hover); }
    .history-item .h-cover {
      width: 48px; height: 64px; border-radius: 8px; object-fit: cover;
      background: var(--bg-soft); flex-shrink: 0;
    }
    .history-item .h-cover.placeholder {
      display: grid; place-items: center; color: #555; font-size: 9px;
    }
    .history-item .h-info { flex: 1; min-width: 0; }
    .history-item .h-title {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-item .h-author { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
    .history-item .h-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      background: var(--bg-soft); border: 1px solid var(--border);
      color: var(--text-dim); display: grid; place-items: center;
      transition: all .15s; font-size: 14px;
    }
    .icon-btn:hover { color: var(--accent); border-color: var(--accent); }

    .empty {
      text-align: center; color: var(--text-dim); font-size: 13px;
      padding: 30px; border: 1px dashed var(--border); border-radius: 12px;
    }
    footer {
      text-align: center; color: #555; font-size: 12px; margin-top: 40px;
    }
    footer a { color: var(--text-dim); }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="dot">🎵</span>
      <span>抖音<span class="accent">无水印</span>下载</span>
    </div>
    <div class="subtitle">粘贴分享文案或链接，一键解析无水印视频</div>
  </header>

  <div class="wrap">
    <!-- 输入 -->
    <div class="input-card">
      <div class="input-row">
        <textarea id="input" placeholder="在此粘贴抖音分享文案，例如：&#10;7.99 复制打开抖音，看看【作者的作品】 https://v.douyin.com/xxxxx/ ..."></textarea>
        <div class="btn-group">
          <button class="btn btn-primary" id="parseBtn">
            <span id="parseBtnText">🔍 解析</span>
          </button>
          <button class="btn btn-ghost" id="pasteBtn">📋 粘贴剪贴板</button>
          <button class="btn btn-ghost" id="clearBtn">✖ 清空</button>
        </div>
      </div>
      <div class="hint">
        <span class="tag">提示</span>
        支持短链 v.douyin.com / 长链 www.douyin.com，可直接粘贴 App 分享的整段文案
      </div>
    </div>

    <!-- 状态条 -->
    <div class="status" id="status"></div>

    <!-- 结果 -->
    <div class="result hidden" id="result">
      <div class="result-head">
        <img class="cover" id="cover" alt="封面" />
        <div class="meta">
          <div class="title" id="title"></div>
          <div class="author" id="author"></div>
          <div class="id-line" id="idLine"></div>
        </div>
      </div>
      <div class="quality-row">
        <span class="label">清晰度：</span>
        <div class="quality-options" id="qualityOptions"></div>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" id="downloadBtn">⬇ 下载视频</button>
        <button class="btn btn-ghost" id="copyUrlBtn">🔗 复制无水印链接</button>
        <span class="badge" id="badge">✓ 已解析为无水印地址</span>
      </div>
    </div>

    <!-- 历史 -->
    <div class="history hidden" id="history">
      <div class="section-title">
        <h2>🕓 本地历史记录</h2>
        <button class="clear" id="clearHistory">清空记录</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <footer>
      本工具仅供个人学习研究使用 · 请尊重原作者版权
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const STATUS = $("status"), RESULT = $("result");

    let currentVideo = null;  // 当前解析结果

    // ----------------- 状态提示 -----------------
    function showStatus(type, msg, autoClose = 0) {
      STATUS.className = "status show " + type;
      let icon = type === "error" ? "⚠️" : type === "success" ? "✅" : "⏳";
      STATUS.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
      if (autoClose) setTimeout(() => STATUS.classList.remove("show"), autoClose);
    }
    function hideStatus() { STATUS.classList.remove("show"); }

    // ----------------- 解析 -----------------
    async function parse() {
      const text = $("input").value.trim();
      if (!text) { showStatus("error", "请先粘贴抖音链接或分享文案"); return; }

      $("parseBtn").disabled = true;
      $("parseBtnText").innerHTML = '<span class="spinner"></span> 解析中...';
      RESULT.classList.add("hidden");
      showStatus("info", "正在解析，请稍候...");

      try {
        const resp = await fetch("/api/parse", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const json = await resp.json();
        if (!resp.ok || !json.ok) {
          throw new Error(json.error || `请求失败 (${resp.status})`);
        }
        renderResult(json.data);
        saveHistory(json.data);
        showStatus("success", "解析成功！", 2500);
      } catch (e) {
        showStatus("error", "解析失败：" + e.message);
      } finally {
        $("parseBtn").disabled = false;
        $("parseBtnText").textContent = "🔍 解析";
      }
    }

    // ----------------- 渲染结果 -----------------
    function renderResult(data) {
      currentVideo = data;
      $("title").textContent = data.title;
      $("author").textContent = data.author ? "👤 " + data.author : "";
      $("idLine").textContent = "ID: " + data.aweme_id;

      const cover = $("cover");
      if (data.cover_url) {
        cover.src = data.cover_url;
        cover.classList.remove("placeholder");
        cover.onerror = () => { cover.classList.add("placeholder"); cover.alt = "无封面"; };
      } else {
        cover.classList.add("placeholder");
        cover.removeAttribute("src");
        cover.alt = "无封面";
      }

      // 渲染清晰度选择器
      renderQualities(data.qualities);

      RESULT.classList.remove("hidden");
      RESULT.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    // ----------------- 清晰度选择 -----------------
    let selectedQuality = null;  // 当前选中的清晰度对象 {ratio,label,url}

    function renderQualities(qualities) {
      const box = $("qualityOptions");
      box.innerHTML = "";
      // 兼容: 没有清晰度列表时, 用默认 video_url 退化为单选项
      if (!qualities || !qualities.length) {
        qualities = [{ ratio: "default", label: "默认", url: currentVideo.video_url }];
      }
      // 默认选中 720p
      let defaultIdx = qualities.findIndex(q => q.ratio === "720p");
      if (defaultIdx < 0) defaultIdx = 0;
      selectedQuality = qualities[defaultIdx];

      qualities.forEach((q, i) => {
        const btn = document.createElement("button");
        btn.className = "quality-opt" + (i === defaultIdx ? " active" : "");
        btn.textContent = q.label;
        btn.dataset.idx = i;
        btn.addEventListener("click", () => {
          selectedQuality = qualities[i];
          box.querySelectorAll(".quality-opt").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
        box.appendChild(btn);
      });
    }

    function getSelectedUrl() {
      return (selectedQuality && selectedQuality.url) || currentVideo.video_url;
    }

    // ----------------- 下载 -----------------
    function download() {
      if (!currentVideo) return;
      const videoUrl = getSelectedUrl();
      const qualityTag = selectedQuality ? selectedQuality.label : "";
      const fname = (currentVideo.author ? currentVideo.author + "_" : "")
                  + currentVideo.title + (qualityTag ? "_" + qualityTag : "") + ".mp4";
      // 走后端代理下载, 规避跨域 + 自动加请求头, 文件名正确
      const url = "/api/proxy?url=" + encodeURIComponent(videoUrl)
                + "&filename=" + encodeURIComponent(fname);
      showStatus("info", `开始下载 ${qualityTag || "视频"}（由浏览器接管）...`);
      const a = document.createElement("a");
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => showStatus("success", "已发起下载请求，请查看浏览器下载", 3000), 500);
    }

    async function copyUrl() {
      if (!currentVideo) return;
      const videoUrl = getSelectedUrl();
      try {
        await navigator.clipboard.writeText(videoUrl);
        showStatus("success", "已复制当前清晰度的无水印链接到剪贴板", 2000);
      } catch {
        showStatus("error", "复制失败，请手动复制");
      }
    }

    // ----------------- 历史记录 (localStorage) -----------------
    const HISTORY_KEY = "douyin_history_v1";

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
      catch { return []; }
    }
    function saveHistory(data) {
      const list = loadHistory().filter(h => h.aweme_id !== data.aweme_id);
      list.unshift({
        aweme_id: data.aweme_id,
        title: data.title,
        author: data.author,
        cover_url: data.cover_url,
        video_url: data.video_url,
        ts: Date.now(),
      });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 30)));
      renderHistory();
    }
    function renderHistory() {
      const list = loadHistory();
      const box = $("history"), inner = $("historyList");
      if (!list.length) { box.classList.add("hidden"); return; }
      box.classList.remove("hidden");
      inner.innerHTML = list.map(h => {
        const coverHtml = h.cover_url
          ? `<img class="h-cover" src="${esc(h.cover_url)}" onerror="this.classList.add('placeholder');this.removeAttribute('src');this.alt='无'">`
          : `<div class="h-cover placeholder">无</div>`;
        return `
          <div class="history-item">
            ${coverHtml}
            <div class="h-info">
              <div class="h-title">${esc(h.title)}</div>
              <div class="h-author">${h.author ? "👤 " + esc(h.author) : ""} · ${timeAgo(h.ts)}</div>
            </div>
            <div class="h-actions">
              <button class="icon-btn" title="重新加载" data-act="load" data-id="${h.aweme_id}">↻</button>
              <button class="icon-btn" title="下载" data-act="dl" data-id="${h.aweme_id}">⬇</button>
              <button class="icon-btn" title="删除" data-act="del" data-id="${h.aweme_id}">✕</button>
            </div>
          </div>`;
      }).join("");
    }
    $("historyList").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const act = btn.dataset.act, id = btn.dataset.id;
      const list = loadHistory();
      const item = list.find(h => h.aweme_id === id);
      if (!item) return;
      if (act === "load") {
        renderResult(item);
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else if (act === "dl") {
        currentVideo = item;
        download();
      } else if (act === "del") {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(list.filter(h => h.aweme_id !== id)));
        renderHistory();
      }
    });
    $("clearHistory").addEventListener("click", () => {
      if (confirm("确定清空所有历史记录？")) {
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
      }
    });

    // ----------------- 工具 -----------------
    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s ?? "";
      return d.innerHTML;
    }
    function timeAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return "刚刚";
      if (s < 3600) return Math.floor(s / 60) + " 分钟前";
      if (s < 86400) return Math.floor(s / 3600) + " 小时前";
      return Math.floor(s / 86400) + " 天前";
    }

    // ----------------- 事件绑定 -----------------
    $("parseBtn").addEventListener("click", parse);
    $("clearBtn").addEventListener("click", () => { $("input").value = ""; $("input").focus(); });
    $("downloadBtn").addEventListener("click", download);
    $("copyUrlBtn").addEventListener("click", copyUrl);

    $("pasteBtn").addEventListener("click", async () => {
      try {
        const text = await navigator.clipboard.readText();
        $("input").value = text.trim();
        showStatus("info", "已粘贴剪贴板内容", 1500);
      } catch {
        showStatus("error", "无法读取剪贴板，请手动粘贴");
      }
    });

    // Ctrl/Cmd + Enter 快捷解析
    $("input").addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") parse();
    });

    // 初始化
    renderHistory();
  </script>
</body>
</html>
